<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 500" fill="none">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="600" y2="500" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#FFF5F5"/>
      <stop offset="100%" stop-color="#FFE8E8"/>
    </linearGradient>
    <linearGradient id="card" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#FFFFFF"/>
      <stop offset="100%" stop-color="#FFF8F8"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#FF4040"/>
      <stop offset="100%" stop-color="#FF6B6B"/>
    </linearGradient>
    <filter id="shadow" x="-10%" y="-10%" width="130%" height="130%">
      <feDropShadow dx="0" dy="8" stdDeviation="16" flood-color="#FF4040" flood-opacity="0.12"/>
    </filter>
  </defs>
  <!-- Background -->
  <rect width="600" height="500" rx="24" fill="url(#bg)"/>
  <!-- Main Card -->
  <rect x="100" y="60" width="400" height="380" rx="20" fill="url(#card)" filter="url(#shadow)" stroke="#FFE0E0" stroke-width="1"/>
  <!-- Building Icon -->
  <circle cx="300" cy="170" r="60" fill="url(#accent)" opacity="0.12"/>
  <!-- Building -->
  <rect x="280" y="125" width="40" height="75" rx="3" fill="#FF4040"/>
  <!-- Building windows -->
  <rect x="287" y="132" width="8" height="8" rx="1" fill="#FFF5F5"/>
  <rect x="305" y="132" width="8" height="8" rx="1" fill="#FFF5F5"/>
  <rect x="287" y="148" width="8" height="8" rx="1" fill="#FFF5F5"/>
  <rect x="305" y="148" width="8" height="8" rx="1" fill="#FFF5F5"/>
  <rect x="287" y="164" width="8" height="8" rx="1" fill="#FFF5F5"/>
  <rect x="305" y="164" width="8" height="8" rx="1" fill="#FFF5F5"/>
  <!-- Building door -->
  <rect x="294" y="183" width="12" height="17" rx="2" fill="#FFF5F5"/>
  <!-- Side building -->
  <rect x="260" y="150" width="20" height="50" rx="2" fill="#FF6B6B"/>
  <rect x="320" y="145" width="20" height="55" rx="2" fill="#FF6B6B"/>
  <!-- Growth arrow -->
  <path d="M340 140 L355 125 L355 135 L365 135" stroke="#FF4040" stroke-width="3" fill="none" stroke-linecap="round"/>
  <!-- Card Lines -->
  <rect x="180" y="250" width="240" height="12" rx="6" fill="#FFD4D4"/>
  <rect x="200" y="275" width="200" height="8" rx="4" fill="#FFE8E8"/>
  <!-- Amount Display -->
  <rect x="170" y="310" width="260" height="60" rx="12" fill="url(#accent)" opacity="0.08"/>
  <text x="300" y="340" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" fill="#FF4040" font-weight="600">SME FINANCING</text>
  <text x="300" y="360" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" fill="#999">Grow your business with us</text>
  <!-- Decorative dots -->
  <circle cx="150" cy="100" r="4" fill="#FF4040" opacity="0.2"/>
  <circle cx="450" cy="400" r="6" fill="#FF4040" opacity="0.15"/>
  <circle cx="480" cy="100" r="3" fill="#FF6B6B" opacity="0.25"/>
</svg>